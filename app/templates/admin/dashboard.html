{% extends "base.html" %}
{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="px-6 space-y-10 pb-20 pt-6">
    <div class="flex items-center justify-between">
        <h1 class="text-3xl font-black text-primary tracking-tight uppercase">Quản trị</h1>
        <div class="px-4 py-2 bg-primary text-accent rounded-2xl text-[10px] font-black uppercase tracking-widest">
            {{ user_count }} Người dùng
        </div>
    </div>

    <!-- ── Notification Broadcast Bento Box ──────────── -->
    <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 space-y-8 relative overflow-hidden group">
        <!-- Background Decoration -->
        <div class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-50 rounded-full blur-3xl opacity-50 group-hover:scale-110 transition-transform duration-1000"></div>
        
        <div class="relative z-10 space-y-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-500">
                    <i data-lucide="megaphone" class="w-6 h-6"></i>
                </div>
                <div>
                    <h2 class="text-lg font-black text-primary tracking-tight">Trung tâm Thông báo</h2>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Gửi Push Notification toàn hệ thống</p>
                </div>
            </div>

            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-3">Tiêu đề thông báo</label>
                    <input type="text" id="push-title" placeholder="VD: Cập nhật tính năng mới..." 
                        class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none font-bold text-primary focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-3">Nội dung chi tiết</label>
                    <textarea id="push-body" placeholder="Nhập nội dung bạn muốn truyền tải tới người dùng..." 
                        class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none font-bold text-primary focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all resize-none h-32"></textarea>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-3">Đường dẫn đích (URL)</label>
                    <input type="text" id="push-url" placeholder="VD: /analytics/" value="/"
                        class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none font-bold text-primary focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all">
                </div>

                <button id="broadcast-btn" onclick="sendBroadcast()" 
                    class="w-full py-5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-full font-black uppercase tracking-[0.2em] shadow-xl shadow-indigo-500/20 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    <span>Gửi toàn hệ thống</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
async function sendBroadcast() {
    const btn = document.getElementById('broadcast-btn');
    const title = document.getElementById('push-title').value.trim();
    const body = document.getElementById('push-body').value.trim();
    const url = document.getElementById('push-url').value.trim();
    const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

    if (!title || !body) {
        alert('Vui lòng điền đầy đủ tiêu đề và nội dung.');
        return;
    }

    if (!confirm('Bạn có chắc chắn muốn gửi thông báo này tới TOÀN BỘ người dùng không?')) {
        return;
    }

    // Trạng thái Loading
    const originalContent = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> <span>ĐANG GỬI...</span>';
    lucide.createIcons();

    try {
        const response = await fetch('/admin/api/push/broadcast', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify({ title, body, url })
        });

        const result = await response.json();

        if (response.ok) {
            alert('🚀 ' + result.message);
            // Reset form
            document.getElementById('push-title').value = '';
            document.getElementById('push-body').value = '';
        } else {
            alert('❌ Lỗi: ' + (result.message || 'Không thể gửi thông báo.'));
        }
    } catch (error) {
        console.error('Error:', error);
        alert('❌ Có lỗi xảy ra trong quá trình kết nối tới máy chủ.');
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalContent;
        lucide.createIcons();
    }
}
</script>
{% endblock %}
