<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}TimeHack{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0A1128', accent: '#00A896', secondary: '#F1A208', offwhite: '#FDFDFF' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #FDFDFF; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-offwhite text-primary antialiased min-h-screen relative">

    <div class="flex flex-col h-screen overflow-hidden relative">
        <!-- Minimal Top Header -->
        <header class="flex items-center justify-center px-6 py-4 pt-safe shrink-0 z-40 bg-white/40 backdrop-blur-md">
            <a href="{{ url_for('time_logging.dashboard') }}" class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-xl bg-primary flex items-center justify-center shadow-lg">
                    <i data-lucide="zap" class="w-4 h-4 text-accent fill-accent"></i>
                </div>
                <span class="text-xl font-black tracking-tighter text-primary">TimeHack</span>
            </a>
        </header>

        <main class="flex-1 overflow-y-auto no-scrollbar pb-28 px-4 pt-4">
            <div class="w-full">
                {% block content %}{% endblock %}
            </div>
        </main>

        <!-- ── FLATTENED 5-TAB NAVIGATION ──────────────── -->
        <nav class="fixed bottom-4 left-4 right-4 z-50">
            <div class="bg-white/90 backdrop-blur-xl border border-white/50 shadow-[0_8px_30px_rgb(0,0,0,0.12)] rounded-[2rem] flex justify-around items-center px-2 py-3">
                
                <!-- 1. Dashboard -->
                <a href="{{ url_for('time_logging.dashboard') }}" class="w-12 h-12 flex items-center justify-center transition-all active:scale-90 {{ 'text-primary' if request.endpoint == 'time_logging.dashboard' else 'text-slate-300' }}">
                    <i data-lucide="layout-grid" class="w-6 h-6 stroke-[2.5]"></i>
                </a>

                <!-- 2. History (Sổ nhật ký) -->
                <a href="{{ url_for('analytics.history') }}" class="w-12 h-12 flex items-center justify-center transition-all active:scale-90 {{ 'text-primary' if request.endpoint == 'analytics.history' else 'text-slate-300' }}">
                    <i data-lucide="book-open" class="w-6 h-6 stroke-[2.5]"></i>
                </a>

                <!-- 3. TRACK (Center, Flat Plus Icon) -->
                <a href="{{ url_for('time_logging.track') }}" class="w-12 h-12 rounded-full flex items-center justify-center transition-all active:scale-90 {{ 'bg-accent text-white shadow-lg shadow-teal-500/20' if request.endpoint == 'time_logging.track' else 'bg-slate-50 text-slate-400' }}">
                    <i data-lucide="plus" class="w-6 h-6 stroke-[3]"></i>
                </a>

                <!-- 4. Tasks -->
                <a href="{{ url_for('todo.index') }}" class="w-12 h-12 flex items-center justify-center transition-all active:scale-90 {{ 'text-primary' if request.endpoint == 'todo.index' else 'text-slate-300' }}">
                    <i data-lucide="check-circle" class="w-6 h-6 stroke-[2.5]"></i>
                </a>

                <!-- 5. Stats (Thống kê) -->
                <a href="{{ url_for('analytics.overview') }}" class="w-12 h-12 flex items-center justify-center transition-all active:scale-90 {{ 'text-primary' if request.endpoint == 'analytics.overview' else 'text-slate-300' }}">
                    <i data-lucide="bar-chart-2" class="w-6 h-6 stroke-[2.5]"></i>
                </a>
            </div>
        </nav>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            document.querySelectorAll('button, a').forEach(el => {
                el.addEventListener('click', () => { if (window.navigator.vibrate) window.navigator.vibrate(5); });
            });
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
